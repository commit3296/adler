name: Audit

# Run cargo-audit against the workspace's resolved dependencies.
#
# - PRs touching Cargo manifests or this workflow file: fast-feedback.
# - Weekly cron on main: catch new CVEs in already-merged deps without
#   waiting for a PR. RustSec publishes advisories continuously; a
#   dep we shipped last week can pick up a CVE tomorrow.
# - workflow_dispatch lets the maintainer re-run on demand after
#   merging a vulnerable-dep bump.
#
# Exit semantics: cargo-audit exits non-zero on `vulnerability`
# advisories (real CVEs) and on yanked crates; it exits zero on
# `unsoundness` / `notice` warnings (those surface in the log but
# don't fail CI). That's the right default for a green badge — vulns
# block, soundness reports inform.

on:
  push:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/audit.yml"
      - "audit.toml"
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/audit.yml"
      - "audit.toml"
  schedule:
    # Monday 04:00 UTC — early-week so a finding lands at the start
    # of the working week instead of accumulating over the weekend.
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # The audit-check action opens / updates a tracking issue on
      # scheduled-run failures so a stale main branch doesn't quietly
      # rot vulnerable.
      issues: write
      # Posts a check run on PRs.
      checks: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
