name: release-plz

# Two-stage automation driven by `release-plz` (config in
# /release-plz.toml):
#
#   * `release-plz-pr`  — on every push to `main`, open or update a
#     Release PR with version bumps + CHANGELOG.md entries derived
#     from commits since the last tagged release. The PR is the
#     review surface for what would ship.
#
#   * `release-plz-release` — on every push to `main`, check whether
#     a tagged version is missing from crates.io and publish it. In
#     practice this fires after a Release PR merge: HEAD now carries
#     the bumped Cargo.toml(s), and release-plz publishes + tags +
#     creates the GitHub Release. The GitHub Release publication then
#     fans out to `.github/workflows/release.yml` for the platform
#     binaries.
#
# Both jobs authenticate as the `adler-release` GitHub App (Client ID
# and private key live in repo secrets). This matters because events
# authored by the default `GITHUB_TOKEN` do NOT cascade to other
# workflows — i.e. release-plz creating a release with GITHUB_TOKEN
# would NOT trigger `release.yml`, breaking the binary upload step.
# Using a GitHub App token makes the release a normal external event
# that downstream workflows pick up.
#
# Concurrency on the release job is serial — never two publishes in
# flight at once, even if commits land back-to-back.

on:
  push:
    branches: [main]

# Least-privilege at workflow level — jobs grant themselves more
# specific scopes (contents: write + pull-requests: write for the PR
# job, contents: write + pull-requests: read for the publish job)
# right where they need them.
permissions:
  contents: read

jobs:
  release-plz-pr:
    name: Release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          client-id: ${{ secrets.RELEASE_PLZ_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # release-plz needs the full history to read the previous
          # tag and the commit range since.
          fetch-depth: 0
          # Use the App token for git push too, otherwise pushes to
          # the Release PR branch fall back to the default token and
          # don't trigger downstream workflows.
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable snapshot; update via dependency PR
      # release-plz's semver-checks builds each crate, which means
      # adler-server needs a populated web/dist/ for rust-embed. The
      # build is fast (~1s); the npm install is the only heavy step.
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: adler-server/web/package-lock.json
      - name: Build adler-web SPA
        working-directory: adler-server/web
        run: |
          npm ci
          npm run build
      - name: Run release-plz
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-release:
    name: Release
    runs-on: ubuntu-latest
    needs: release-plz-pr
    permissions:
      contents: write
      pull-requests: read
    # Cross-run serialization: only one publish in flight at a time,
    # even if multiple commits land on `main` in quick succession.
    # `cancel-in-progress: false` lets every queued release finish
    # rather than dropping work.
    concurrency:
      group: release-plz-release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          client-id: ${{ secrets.RELEASE_PLZ_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable snapshot; update via dependency PR
      # `cargo publish` packages adler-server from its own directory
      # and verifies it in a sandbox build, so web/dist/ must exist
      # (rust-embed reads it, and `include` ships it in the tarball)
      # before release-plz invokes cargo publish.
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: adler-server/web/package-lock.json
      - name: Build adler-web SPA
        working-directory: adler-server/web
        run: |
          npm ci
          npm run build
      - name: Run release-plz
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
