name: fuzz

on:
  pull_request:
    paths:
      - "adler-core/**"
      - "fuzz/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/fuzz.yml"
  schedule:
    - cron: "0 5 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: cargo fuzz
    runs-on: ubuntu-latest
    env:
      FUZZ_RUNS: ${{ github.event_name == 'schedule' && '4096' || '256' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install nightly Rust toolchain
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly snapshot; update via dependency PR

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --version 0.13.2 --locked

      - name: Build fuzz targets
        run: cargo +nightly fuzz build

      - name: Run registry_json
        run: cargo +nightly fuzz run registry_json -- -runs="$FUZZ_RUNS"

      - name: Run site_json
        run: cargo +nightly fuzz run site_json -- -runs="$FUZZ_RUNS"

      - name: Run username_permute
        run: cargo +nightly fuzz run username_permute -- -runs="$FUZZ_RUNS"
