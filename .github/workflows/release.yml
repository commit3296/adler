name: release

# Attach cross-platform `adler` binaries to a GitHub Release after
# release-plz publishes it.
#
# Trigger: `release: published`, filtered to releases whose tag is the
# workspace version pattern `v<X.Y.Z>` (the one release-plz creates
# for adler-cli; see /release-plz.toml). We deliberately ignore the
# per-crate releases that release-plz would otherwise emit — only the
# binary deserves a platform-binary upload.
#
# Archive names match the [package.metadata.binstall] template in
# adler-cli/Cargo.toml so `cargo binstall adler-cli` picks them up.
#
# Manual `workflow_dispatch` is kept for re-runs (e.g. one platform
# job flaked and the rest succeeded).

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  upload:
    name: ${{ matrix.target }}
    # Skip the per-crate releases that release-plz creates for
    # adler-core (which have no `v` prefix — they're disabled in
    # release-plz.toml, but defensive).
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'v')
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            features: impersonate
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            # Cross-compiling BoringSSL to aarch64-linux from an x86_64
            # runner needs an aarch64 C/C++ toolchain wired through to
            # boring-sys2; ship the slimmer build here for now and let
            # users opt back in via `cargo install --features impersonate`.
            features: ""
          - target: x86_64-apple-darwin
            # macos-13 was deprecated 2025-09-22 and is effectively
            # unavailable in queues; `macos-15-intel` is GitHub's official
            # x86_64 Intel migration target (good through ~Fall 2027).
            os: macos-15-intel
            features: impersonate
          - target: aarch64-apple-darwin
            os: macos-14
            features: impersonate
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            features: impersonate
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable snapshot; update via dependency PR
        with:
          targets: ${{ matrix.target }}

      # BoringSSL (via boring-sys2, pulled in by wreq for the
      # `impersonate` feature) compiles from C/C++ at build time and
      # uses bindgen, so the host needs cmake, a C++ compiler, and
      # libclang. The steps below short-circuit when this target is
      # built without the feature.
      - name: Install BoringSSL build deps (Linux)
        if: matrix.os == 'ubuntu-latest' && matrix.features == 'impersonate'
        timeout-minutes: 25
        env:
          DEBIAN_FRONTEND: noninteractive
          APT_OPTS: -o Acquire::Retries=5 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30
        run: |
          sudo apt-get $APT_OPTS update
          sudo apt-get $APT_OPTS install -y --no-install-recommends cmake clang libclang-dev

      - name: Install BoringSSL build deps (macOS)
        if: startsWith(matrix.os, 'macos') && matrix.features == 'impersonate'
        run: |
          command -v cmake >/dev/null || brew install cmake

      - name: Install BoringSSL build deps (Windows)
        if: matrix.os == 'windows-latest' && matrix.features == 'impersonate'
        shell: bash
        run: |
          # LLVM is preinstalled at C:\Program Files\LLVM on the
          # windows-latest runner image; bindgen needs LIBCLANG_PATH
          # to locate libclang.dll.
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" >> "$GITHUB_ENV"

      # adler-server's `rust-embed` bakes the SolidJS bundle in
      # `web/dist/` into the final binary. dist/ is gitignored, so we
      # must produce it on every release-job machine before
      # `taiki-e/upload-rust-binary-action` invokes `cargo build`.
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: adler-server/web/package-lock.json

      - name: Build adler-web frontend
        working-directory: adler-server/web
        run: |
          npm ci
          npm run build

      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@f0d45ae91ee7b8ee928de7a9d04d893a08bcbec6 # v1
        with:
          bin: adler
          # Matches the binstall pkg-url: adler-<target>.tar.gz / .zip
          archive: adler-$target
          target: ${{ matrix.target }}
          # When non-empty, ships the binary with TLS-fingerprint
          # impersonation built in (Chrome 134 via wreq + BoringSSL).
          # See the matrix above for per-target settings.
          features: ${{ matrix.features }}
          # rustls (no OpenSSL) means no system TLS dep to cross-link.
          tar: unix
          zip: windows
          include: LICENSE,README.md
          token: ${{ secrets.GITHUB_TOKEN }}

  sign:
    name: Sign release artifacts
    needs: upload
    if: github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    # cosign keyless signing exchanges the workflow's OIDC token for a
    # short-lived Sigstore certificate. The certificate is bound to the
    # workflow file path + ref, so a downstream verifier can pin the
    # exact origin (`https://github.com/commit3296/adler/.github/workflows/release.yml@refs/tags/v0.X.Y`).
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Download release archives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          # taiki-e uploaded archives matching adler-*.tar.gz / .zip
          # earlier in this workflow. Pull them down to sign locally.
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern 'adler-*.tar.gz' \
            --pattern 'adler-*.zip'
          ls -la adler-*

      - name: Sign each archive (cosign keyless, OIDC)
        run: |
          for f in adler-*.tar.gz adler-*.zip; do
            [ -f "$f" ] || continue
            echo "::group::sign $f"
            cosign sign-blob \
              --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "$f"
            # Verification sanity-check inside the same job — catches
            # regressions in the OIDC + Fulcio pipeline before users do.
            cosign verify-blob \
              --certificate "${f}.pem" \
              --signature "${f}.sig" \
              --certificate-identity-regexp "^https://github\\.com/${{ github.repository }}/\\.github/workflows/release\\.yml@refs/tags/v[0-9]+\\.[0-9]+\\.[0-9]+" \
              --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
              "$f"
            echo "::endgroup::"
          done

      - name: Upload signatures to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$TAG" adler-*.sig adler-*.pem \
            --repo "${{ github.repository }}" \
            --clobber
