name: release

# Build cross-platform `adler` binaries and attach them to the GitHub
# Release when a `v*` tag is pushed. Archive names match the
# [package.metadata.binstall] template in adler-cli/Cargo.toml, so
# `cargo binstall adler-cli` picks them up.
#
# Two-stage layout: `create-release` makes (or reuses) the Release once;
# then the matrix uploads artefacts into it. Running creation inside the
# matrix races — five jobs simultaneously call `gh release create` and all
# but one fail with "release not found" during their upload poll.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    name: create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create or reuse the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists, reusing"
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --verify-tag
          fi

  upload:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: adler
          # Matches the binstall pkg-url: adler-<target>.tar.gz / .zip
          archive: adler-$target
          target: ${{ matrix.target }}
          # rustls (no OpenSSL) means no system TLS dep to cross-link.
          tar: unix
          zip: windows
          include: LICENSE,README.md
          token: ${{ secrets.GITHUB_TOKEN }}
