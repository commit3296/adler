name: release

# Build cross-platform `adler` binaries and attach them to the GitHub
# Release when a `v*` tag is pushed. Archive names match the
# [package.metadata.binstall] template in adler-cli/Cargo.toml, so
# `cargo binstall adler-cli` picks them up.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: adler
          # Matches the binstall pkg-url: adler-<target>.tar.gz / .zip
          archive: adler-$target
          target: ${{ matrix.target }}
          # rustls (no OpenSSL) means no system TLS dep to cross-link.
          tar: unix
          zip: windows
          include: LICENSE,README.md
          token: ${{ secrets.GITHUB_TOKEN }}
