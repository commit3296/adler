name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: short

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege: CI only needs to read the source. No token writes,
# no SARIF / issues / packages. Scorecard's Token-Permissions check
# fails the workflow if any token has more than the minimum needed.
permissions:
  contents: read

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable snapshot; update via dependency PR
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # adler-server embeds `web/dist/` via rust-embed at compile time.
      # dist/ is gitignored, so cargo would otherwise build a binary
      # that 503s on `/` with "frontend not built". Build the SolidJS
      # bundle first; `rust-embed` then snapshots the produced files
      # into the resulting object code.
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: adler-server/web/package-lock.json

      - name: Typecheck adler-web frontend
        working-directory: adler-server/web
        run: |
          npm ci
          npm run typecheck

      - name: Unit test adler-web frontend
        working-directory: adler-server/web
        run: npm run unit

      - name: Contract test adler-web frontend
        working-directory: adler-server/web
        run: npm run contract

      - name: Build adler-web frontend
        working-directory: adler-server/web
        run: |
          npm run build

      - name: Audit adler-web frontend dependencies
        working-directory: adler-server/web
        run: npm audit --audit-level=moderate

      - name: Install Playwright browser
        working-directory: adler-server/web
        run: npx playwright install --with-deps chromium

      - name: Smoke test adler-web frontend
        working-directory: adler-server/web
        run: npm run smoke

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-targets

      # `--all-targets` skips doctests, so run them explicitly — otherwise a
      # broken `///` example slips through CI.
      - name: cargo test --doc
        run: cargo test --workspace --doc

      - name: MCP HTTP probe
        env:
          ADLER_BIN: target/debug/adler
          ADLER_MCP_SKIP_LIVE: "1"
        run: python3 adler-mcp/examples/probe_http.py

      # `impersonate` is an optional feature (wreq + BoringSSL via cmake +
      # bindgen via libclang). Off by default in our other CI steps, so a
      # `#[cfg(feature = "impersonate")]` regression would slip through.
      # Install the toolchain and check the feature compiles + tests.
      - name: Install BoringSSL build deps (impersonate feature)
        timeout-minutes: 25
        env:
          DEBIAN_FRONTEND: noninteractive
          APT_OPTS: -o Acquire::Retries=5 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30
        run: |
          sudo apt-get $APT_OPTS update
          sudo apt-get $APT_OPTS install -y --no-install-recommends cmake clang libclang-dev

      - name: cargo clippy --features impersonate
        run: cargo clippy -p adler-cli --features impersonate --all-targets -- -D warnings

      - name: cargo test --features impersonate
        run: cargo test -p adler-core --features impersonate --all-targets
