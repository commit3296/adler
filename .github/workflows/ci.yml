name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: short

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # adler-server embeds `web/dist/` via rust-embed at compile time.
      # dist/ is gitignored, so cargo would otherwise build a binary
      # that 503s on `/` with "frontend not built". Build the SolidJS
      # bundle first; `rust-embed` then snapshots the produced files
      # into the resulting object code.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: adler-server/web/package-lock.json

      - name: Build adler-web frontend
        working-directory: adler-server/web
        run: |
          npm ci
          npm run build

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-targets

      # `--all-targets` skips doctests, so run them explicitly — otherwise a
      # broken `///` example slips through CI.
      - name: cargo test --doc
        run: cargo test --workspace --doc
